<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EasyJob AI</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#070d1a;
color:#eef2ff;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.card{
background:#0e1623;
border-radius:12px;
padding:20px;
margin-bottom:12px;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:translateY(-2px);
}

.btn{
background:#5b52f5;
border:none;
padding:10px 18px;
border-radius:6px;
color:white;
cursor:pointer;
}

.score{
font-weight:bold;
color:#00c896;
}
</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState} = React

const JOBS = [
{
title:"Product Manager",
company:"Zepto",
salary:"₹25–40 LPA",
skills:["product","analytics","strategy"]
},
{
title:"Business Analyst",
company:"McKinsey",
salary:"₹18–28 LPA",
skills:["analysis","excel","strategy"]
},
{
title:"Growth Analyst",
company:"CRED",
salary:"₹15–22 LPA",
skills:["sql","growth","analytics"]
},
{
title:"Program Manager",
company:"Teach For India",
salary:"₹8–14 LPA",
skills:["program","impact","management"]
}
]

function calculateMatch(resume,job){
if(!resume) return 30

let score = 30
job.skills.forEach(s=>{
if(resume.toLowerCase().includes(s)) score+=20
})

return Math.min(score,95)
}

function App(){

const [resume,setResume] = useState("")
const [selectedJob,setSelectedJob] = useState(null)
const [applications,setApplications] = useState([])

function apply(job){
setApplications([...applications,job])
alert("Application submitted!")
}

return(

<div className="container">

<h1>🚀 EasyJob AI</h1>

<p style={{color:"#6b7a99"}}>
Find jobs matched to your resume
</p>

<h3>Paste Resume</h3>

<textarea
style={{
width:"100%",
height:"120px",
padding:"10px",
borderRadius:"8px",
marginBottom:"20px"
}}
placeholder="Paste your resume here..."
value={resume}
onChange={(e)=>setResume(e.target.value)}
/>

<h3>Job Matches</h3>

{JOBS.map((job,i)=>{

const score = calculateMatch(resume,job)

return(

<div
key={i}
className="card"
onClick={()=>setSelectedJob(job)}
>

<h3>{job.title}</h3>

<p>{job.company}</p>

<p>{job.salary}</p>

<p className="score">
Match Score: {score}%
</p>

</div>

)

})}

{selectedJob && (

<div
style={{
background:"#111d2e",
padding:"20px",
borderRadius:"12px",
marginTop:"30px"
}}
>

<h2>{selectedJob.title}</h2>

<p>{selectedJob.company}</p>

<p>{selectedJob.salary}</p>

<h4>Required Skills</h4>

<ul>
{selectedJob.skills.map((s,i)=>
<li key={i}>{s}</li>
)}
</ul>

<button
className="btn"
onClick={()=>apply(selectedJob)}
>
Apply with AI
</button>

</div>

)}

<h3 style={{marginTop:"40px"}}>My Applications</h3>

{applications.length===0 && (
<p style={{color:"#6b7a99"}}>
No applications yet
</p>
)}

{applications.map((a,i)=>(
<div key={i} className="card">
<h4>{a.title}</h4>
<p>{a.company}</p>
</div>
))}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />)

</script>

</body>
</html>
