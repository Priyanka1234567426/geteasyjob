/* ─── CLAUDE API ────────────────────────────────────────────────── */
async function callClaude(messages, sys) {
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:sys, messages })
    });
    const d = await r.json();
    return d.content?.map(b => b.text||"").join("") || "";
  } catch(e) { return ""; }
}

/* ─── PRIMITIVES ─────────────────────────────────────────────────── */
function Tag({ c, ch }) {
  const col = c==="green"?C.green:c==="warn"?C.warn:c==="danger"?C.danger:c==="gold"?C.gold:c==="purple"?C.purple:c==="teal"?C.teal:C.accent;
  return <span style={{display:"inline-block",background:`${col}18`,color:col,border:`1px solid ${col}40`,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700,letterSpacing:".5px",textTransform:"uppercase"}}>{ch}</span>;
}

function Spinner({ text }) {
  const [d, setD] = useState(".");
  useEffect(() => { const t = setInterval(() => setD(p => p.length>=3?".":p+"."), 400); return () => clearInterval(t); }, []);
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:40}}>
      <div style={{width:40,height:40,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.accent}`,borderRadius:"50%",animation:"spin 1s linear infinite"}} />
      <p style={{color:C.muted,fontSize:13}}>{text}{d}</p>
    </div>
  );
}

function PctRing({ pct, size=54, color }) {
  const r = size*0.38, circ = 2*Math.PI*r, fill = (pct/100)*circ;
  const col = color||(pct>=70?C.green:pct>=45?C.warn:C.danger);
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth="3.5"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="3.5" strokeDasharray={`${fill} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:size*.22,fontWeight:800,color:col,lineHeight:1}}>{pct}%</span>
      </div>
    </div>
  );
}

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const toast = useCallback((title, body, type="info", icon) => {
    const id = Date.now();
    setToasts(p => [...p,{id,title,body,type,icon}]);
    setTimeout(() => setToasts(p => p.filter(t => t.id!==id)), 4000);
  }, []);
  const dismiss = id => setToasts(p => p.filter(t => t.id!==id));
  return { toasts, toast, dismiss };
}

function ToastContainer({ toasts, dismiss }) {
  return (
    <div style={{position:"fixed",bottom:24,right:24,zIndex:999,display:"flex",flexDirection:"column",gap:10,alignItems:"flex-end",pointerEvents:"none"}}>
      {toasts.map(t => (
        <div key={t.id} onClick={() => dismiss(t.id)} style={{pointerEvents:"all",background:C.card3,border:`1px solid ${t.type==="success"?C.green:t.type==="warn"?C.warn:C.border}`,borderRadius:12,padding:"12px 18px",maxWidth:300,cursor:"pointer",animation:"fadeUp .3s ease",boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:18}}>{t.icon||"💬"}</span>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:C.text}}>{t.title}</div>
              {t.body && <div style={{fontSize:11,color:C.muted,marginTop:2}}>{t.body}</div>}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function OnboardingProgress({ step }) {

  return (

      <div style={{display:"flex",alignItems:"center"}}>
        {labels.map((l, i) => (
          <React.Fragment key={i}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
              <div style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,background:i<step?C.green:i===step?C.accent:C.card2,color:i<step?"#04120c":"#fff",border:`2px solid ${i<step?C.green:i===step?C.accent:C.border}`,transition:".3s"}}>
                {i < step ? "✓" : i+1}
              </div>
              <span style={{fontSize:10,color:i<=step?C.text:C.muted,fontWeight:i===step?700:400,whiteSpace:"nowrap"}}>{l}</span>
            </div>
            {i < labels.length-1 && <div style={{flex:1,height:2,background:i<step?C.green:C.border,margin:"0 8px",marginBottom:14,transition:".3s"}} />}
          </React.Fragment>
        ))}
      </div>
      <p style={{textAlign:"center",fontSize:11,color:C.muted,marginTop:10}}>Step {step+1} of 3</p>
    </div>
  );
}

/* ─── JOB DASHBOARD ─────────────────────────────────────────────── */
function JobDashboard({ profile, onUpdateProfile, onSelect, appliedJobIds, bookmarkedJobIds, onToggleBookmark, toast }) {
  const [search, setSearch]     = useState("");
  const [sortBy, setSortBy]     = useState("match");
  const [showBM, setShowBM]     = useState(false);
  const [editOpen, setEditOpen] = useState(false);

  const score = job => {
    const rl = profile.resume.toLowerCase();
    const hits = job.skills.filter(s => rl.includes(s.name.toLowerCase().split(" ")[0])).length;
    return Math.min(95, Math.round((hits/job.skills.length)*60)+20);
  };

  let jobs = JOBS.filter(j => profile.buckets.includes(j.bucket) || profile.buckets.includes("Mixed"));
  if (search.trim()) {
    const q = search.toLowerCase();
    jobs = jobs.filter(j => j.title.toLowerCase().includes(q)||j.company.toLowerCase().includes(q)||j.skills.some(s=>s.name.toLowerCase().includes(q)));
  }
  if (showBM) jobs = jobs.filter(j => bookmarkedJobIds.has(j.id));
  const sorted = [...jobs].sort((a,b) => sortBy==="match"?score(b)-score(a):sortBy==="salary"?parseInt(b.salary.replace(/\D/g,""))-parseInt(a.salary.replace(/\D/g,"")):a.company.localeCompare(b.company));

  return (
    <div>
      {editOpen && <EditProfileModal profile={profile} onSave={p => { onUpdateProfile(p); setEditOpen(false); toast("Profile updated ✅","Your match scores have refreshed","success","👤"); }} onClose={() => setEditOpen(false)} />}

      {/* Header row */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <Tag c="green" ch="Dashboard"/>
          <h2 style={{fontSize:24,fontWeight:900,margin:"10px 0 4px"}}>Hey {profile.name.split(" ")[0]} 👋</h2>
          <p style={{color:C.muted,fontSize:14}}>{sorted.length} roles matched · Click any to see your full fit analysis</p>
        </div>
        <button onClick={() => setEditOpen(true)} style={{...S.btnO,display:"flex",alignItems:"center",gap:8,padding:"9px 18px",flexShrink:0}}>✏️ Edit Profile</button>
      </div>

      {/* Profile strip (from V1) */}
      <div style={{...S.card,marginBottom:20,padding:14,background:"rgba(91,82,245,.05)",border:`1px solid rgba(91,82,245,.15)`}}>
        <div style={{display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{width:42,height:42,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.green})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,flexShrink:0,color:"#fff"}}>{profile.name[0]}</div>
          <div style={{flex:1,minWidth:140}}>
            <div style={{fontWeight:700,fontSize:14}}>{profile.name}</div>
            <div style={{color:C.muted,fontSize:12,marginTop:2}}>{profile.education} · {profile.experience||"Experience not set"}</div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {profile.buckets.map(b => <span key={b} style={{background:"rgba(0,200,150,.1)",color:C.green,border:"1px solid rgba(0,200,150,.2)",borderRadius:16,padding:"3px 10px",fontSize:11,fontWeight:600}}>{BUCKET_ICONS[b]} {b}</span>)}
          </div>
        </div>
      </div>

      {/* Search + sort + bookmark */}
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:160,position:"relative"}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.muted}}>🔍</span>
          <input style={{...S.inp,paddingLeft:34}} placeholder="Search title, company, skill…" value={search} onChange={e => setSearch(e.target.value)}/>
        </div>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{...S.inp,width:"auto",cursor:"pointer"}}>
          <option value="match">Best Match</option>
          <option value="salary">Highest Salary</option>
          <option value="company">Company A–Z</option>
        </select>
        <button onClick={() => setShowBM(b => !b)} style={{...(showBM?S.btn:S.btnO),display:"flex",alignItems:"center",gap:6,padding:"10px 14px",flexShrink:0}}>
          🔖 {showBM?"All Jobs":"Saved"}
          {bookmarkedJobIds.size>0 && <span style={{background:showBM?"rgba(255,255,255,.2)":`${C.accent}30`,color:showBM?"#fff":C.accentL,borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>{bookmarkedJobIds.size}</span>}
        </button>
      </div>

      {sorted.length===0 && (
        <div style={{...S.card,textAlign:"center",padding:40}}>
          <div style={{fontSize:40,marginBottom:12}}>{showBM?"🔖":"🔍"}</div>
          <div style={{fontWeight:700,marginBottom:6}}>{showBM?"No saved jobs yet":"No jobs match your search"}</div>
          <div style={{color:C.muted,fontSize:13}}>{showBM?"Bookmark jobs to review them later":"Try a different keyword or clear your search"}</div>
        </div>
      )}

      <div style={{display:"grid",gap:10}}>
        {sorted.map((job, idx) => {
          const sc = score(job), applied = appliedJobIds.has(job.id), bm = bookmarkedJobIds.has(job.id);
          return (
            <div key={job.id} style={{...S.card,cursor:"pointer",display:"flex",alignItems:"center",gap:14,transition:".2s",animation:`fadeUp .25s ease ${idx*.04}s both`,position:"relative"}}

              onMouseLeave={e => e.currentTarget.style.borderColor=C.border}
              onClick={() => onSelect(job, sc)}>
              {applied && <div style={{position:"absolute",top:10,right:50,background:`${C.green}18`,color:C.green,border:`1px solid ${C.green}40`,borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700}}>✓ APPLIED</div>}
              {job.hot && !applied && <div style={{position:"absolute",top:10,right:50,background:`${C.warn}18`,color:C.warn,border:`1px solid ${C.warn}40`,borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700}}>🔥 HOT</div>}
              <PctRing pct={sc} size={52}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,paddingRight:80}}>{job.title}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:2}}>{job.company} · {job.location} · <span style={{background:`${C.accent}15`,color:C.accentL,padding:"1px 6px",borderRadius:4,fontSize:11}}>{job.bucket}</span></div>
                <div style={{color:C.green,fontSize:13,marginTop:3,fontWeight:600}}>{job.salary} <span style={{color:C.muted,fontWeight:400}}>· {job.yoe}y exp</span></div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,maxWidth:160}}>
                {job.skills.filter(s=>s.major).slice(0,2).map(s=><span key={s.name} style={{background:`${C.accent}10`,color:C.accentL,fontSize:10,padding:"2px 8px",borderRadius:6}}>{s.name}</span>)}
              </div>
              <button onClick={e => { e.stopPropagation(); onToggleBookmark(job.id); }} style={{background:"none",border:`1px solid ${bm?C.warn:C.border}`,borderRadius:8,cursor:"pointer",fontSize:14,color:bm?C.warn:C.muted,padding:"6px 9px",flexShrink:0,transition:".2s"}}>🔖</button>
              <span style={{color:C.muted,fontSize:18}}>›</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── JOB DETAIL ─────────────────────────────────────────────────── */
function JobDetail({ job, initScore, profile, onBack, onApply, savedSkills, onSaveSkills, toast }) {
  const [phase, setPhase] = useState("overview");
  const initSkills = () => { const m={}; job.skills.forEach(s => m[s.name]=3); return m; };
  const [skills, setSkills] = useState(savedSkills || initSkills());
  const [opts,   setOpts]   = useState({ resume:true, cover:false });
  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState(null);
  const [score,  setScore]    = useState(initScore);
  const [interviewPrep,  setInterviewPrep]  = useState(null);
  const [prepLoading,    setPrepLoading]    = useState(false);

  useEffect(() => { onSaveSkills(job.id, skills); }, [skills]);

  const calcScore = () => {
    const maj = job.skills.filter(s=>s.major), min = job.skills.filter(s=>!s.major);
    const mA = maj.reduce((a,s) => a+(skills[s.name]||3),0)/maj.length;
    const nA = min.reduce((a,s) => a+(skills[s.name]||3),0)/min.length;
    return Math.min(98, Math.round(mA*14+nA*6+8));
  };

  const tailor = async () => {
    setLoading(true); setPhase("result");
    const sys = "You are EasyJob's AI. Return ONLY valid JSON. Keys: summary(string),atsScore(int 60-95),hmScore(int 55-90),atsNotes(array of 3 strings),hmNotes(array of 3 strings),tailoredResume(string),coverLetter(string),improvements(array of 4 strings)";
    const prompt = `Job: ${job.title} at ${job.company}. Skills: ${job.skills.map(s=>s.name).join(", ")}. Candidate: ${profile.name}, ${profile.experience}, ${profile.education}. Resume: ${profile.resume.substring(0,400)}. Self-ratings: ${job.skills.map(s=>`${s.name}:${skills[s.name]}/5`).join(", ")}. Generate resume=${opts.resume}, cover=${opts.cover}`;
    try {
      const raw = await callClaude([{role:"user",content:prompt}], sys);
      setResult(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) {
      setResult({ summary:`Tailored for ${job.title} at ${job.company}.`, atsScore:82, hmScore:74, atsNotes:["Keywords aligned with JD","Clean ATS-friendly format","Core skills highlighted"], hmNotes:["Experience directly relevant","Achievements quantified","Strong role fit signals"], tailoredResume:`${profile.name}\n\nTailored for: ${job.title} at ${job.company}\n\n${profile.resume}\n\n[AI-optimised for this role]`, coverLetter:opts.cover?`Dear Hiring Team,\n\nI am excited to apply for ${job.title} at ${job.company}.\n\nBest regards,\n${profile.name}`:"", improvements:["Aligned experience with JD","Added missing keywords","Strengthened bullet points","Optimised skills section"] });
    }
    setLoading(false);
  };

  const genPrep = async () => {
    setPrepLoading(true);
    const sys = "You are an interview coach. Return ONLY valid JSON. Keys: questions(array of 5 objects each with q,hint,framework)";
    const prompt = `Role: ${job.title} at ${job.company}. Skills: ${job.skills.map(s=>s.name).join(", ")}. Generate 5 interview questions with hints and frameworks.`;
    try {
      const raw = await callClaude([{role:"user",content:prompt}], sys);
      setInterviewPrep(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) {
      setInterviewPrep({questions:[
        {q:`Tell me about a time you applied ${job.skills[0]?.name} to solve a real problem.`,hint:"Use STAR — Situation, Task, Action, Result.",framework:"STAR"},
        {q:"How do you prioritise competing demands?",hint:"Show you have a system.",framework:"STAR"},
        {q:`What do you know about ${job.company}'s business model?`,hint:"Research recent news.",framework:"Research"},
        {q:"Describe a failure you learned from.",hint:"Show self-awareness and growth.",framework:"STAR"},
        {q:"Where is your biggest skill gap for this role?",hint:"Be honest — show a plan.",framework:"Reflection"},
      ]});
    }
    setPrepLoading(false);
  };

  const matchV = score>=70?{l:"Strong Match",c:C.green,i:"🟢"}:score>=45?{l:"Moderate Match",c:C.warn,i:"🟡"}:{l:"Low Match",c:C.danger,i:"🔴"};

  if (phase==="overview") return (
    <div style={{maxWidth:700,margin:"0 auto"}}>
      <button style={{...S.btnO,marginBottom:18,padding:"7px 14px",fontSize:12}} onClick={onBack}>← Back to Jobs</button>
      <div style={S.card}>
        <div style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:20}}>
          <PctRing pct={score} size={60}/>
          <div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
              <h2 style={{fontSize:20,fontWeight:900}}>{job.title}</h2>
              {job.hot && <Tag c="warn" ch="🔥 Hot"/>}
            </div>
            <p style={{color:C.muted,fontSize:13}}>{job.company} · {job.location} · {job.yoe} yrs exp</p>
            <p style={{color:C.green,fontWeight:700,marginTop:4}}>{job.salary}</p>
          </div>
        </div>
        <p style={{fontSize:14,color:"#bbc8e0",lineHeight:1.75,marginBottom:18}}>{job.desc}</p>
        <div style={{marginBottom:18}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:10}}>Required Skills</h3>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:6}}>
            {job.skills.map(s => <span key={s.name} style={{background:s.major?`${C.green}15`:`${C.accent}10`,color:s.major?C.green:C.accentL,border:`1px solid ${s.major?`${C.green}30`:`${C.accent}25`}`,fontSize:12,padding:"4px 12px",borderRadius:8,fontWeight:s.major?600:400}}>{s.major?"★ ":""}{s.name}</span>)}
          </div>
          <p style={{fontSize:11,color:C.muted}}>★ = Major skill — weighted higher in your fit score</p>
        </div>
        <div style={{background:`${C.purple}0c`,border:`1px solid ${C.purple}25`,borderRadius:12,padding:14,marginBottom:18}}>
          <div style={{fontSize:12,fontWeight:700,color:C.purple,marginBottom:8}}>🚀 Skills to grow for this role</div>

  );

  if (phase==="assess") return (
    <div style={{maxWidth:560,margin:"0 auto"}}>
      <button style={{...S.btnO,marginBottom:18,padding:"7px 14px",fontSize:12}} onClick={() => setPhase("overview")}>← Back</button>
      <div style={S.card}>
        <Tag c="green" ch="Skill Assessment"/>
        <h2 style={{fontSize:20,fontWeight:900,margin:"10px 0 4px"}}>Rate Your Proficiency</h2>
        <p style={{color:C.muted,fontSize:13,marginBottom:16}}>Be honest — accurate ratings improve tailoring and your fit score.</p>
        {/* Skill legend */}
        <div style={{background:`${C.accent}07`,border:`1px solid ${C.accent}15`,borderRadius:10,padding:"10px 14px",marginBottom:18}}>

        <div style={{fontSize:11,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>★ Major Skills</div>
        {job.skills.filter(s=>s.major).map(s => {
          const val = skills[s.name]||3;
          return (
            <div key={s.name} style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:600}}>{s.name}</span>
                <span style={{fontSize:12,color:SKILL_COLORS[val],fontWeight:700}}>{val}/5 — {SKILL_LABELS[val]}</span>
              </div>
              <input type="range" min={1} max={5} value={val} onChange={e => setSkills(sk=>({...sk,[s.name]:Number(e.target.value)}))} style={{width:"100%",accentColor:SKILL_COLORS[val],cursor:"pointer"}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.muted,marginTop:2}}><span>Beginner</span><span>Expert</span></div>
            </div>
          );
        })}
        <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,marginTop:6}}>Minor Skills</div>
        {job.skills.filter(s=>!s.major).map(s => {
          const val = skills[s.name]||3;
          return (
            <div key={s.name} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:13,color:C.muted}}>{s.name}</span>
                <span style={{fontSize:12,color:SKILL_COLORS[val],fontWeight:700}}>{val}/5 — {SKILL_LABELS[val]}</span>
              </div>
              <input type="range" min={1} max={5} value={val} onChange={e => setSkills(sk=>({...sk,[s.name]:Number(e.target.value)}))} style={{width:"100%",accentColor:SKILL_COLORS[val],cursor:"pointer"}}/>
            </div>
          );
        })}
        <button style={{...S.btnG,width:"100%",padding:14}} onClick={() => { setScore(calcScore()); setPhase("tailor"); }}>Get My Fit Score →</button>
      </div>
    </div>
  );

  if (phase==="tailor") {
    const maj = job.skills.filter(s=>s.major), min = job.skills.filter(s=>!s.major);
    const mA = (maj.reduce((a,s)=>a+(skills[s.name]||3),0)/maj.length).toFixed(1);
    const nA = (min.reduce((a,s)=>a+(skills[s.name]||3),0)/min.length).toFixed(1);
    return (
      <div style={{maxWidth:560,margin:"0 auto"}}>
        <button style={{...S.btnO,marginBottom:18,padding:"7px 14px",fontSize:12}} onClick={() => setPhase("assess")}>← Back</button>
        <div style={S.card}>
          <div style={{textAlign:"center",padding:"18px 0 20px"}}>
            <div style={{fontSize:50}}>{matchV.i}</div>
            <div style={{fontSize:42,fontWeight:900,color:matchV.c,marginTop:6}}>{score}%</div>
            <div style={{fontSize:18,fontWeight:700,color:matchV.c}}>{matchV.l}</div>
            <p style={{color:C.muted,fontSize:13,marginTop:4}}>for {job.title} at {job.company}</p>
          </div>
          {/* Score breakdown (from V1) */}
          <div style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:10,letterSpacing:.5}}>Score Breakdown</div>
            {[
              [`★ Major skills avg ×14`, `${mA}/5`, `+${Math.round(mA*14)} pts`, C.green],
              [`Minor skills avg ×6`,    `${nA}/5`, `+${Math.round(nA*6)} pts`,  C.accentL],
              [`Base score`,             ``,        `+8 pts`,                     C.muted],
            ].map(([l,s,pt,c]) => (
              <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderTop:`1px solid ${C.border}`}}>
                <span style={{color:"#bbc8e0"}}>{l} {s&&<span style={{color:c,fontWeight:600}}>({s})</span>}</span>
                <span style={{color:c,fontWeight:700}}>{pt}</span>
              </div>
            ))}
          </div>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:10}}>Optimise Your Application</h3>
          {[["resume","📄","Tailored Resume","AI rewrites for ATS — specific to this role"],["cover","✉️","Cover Letter","Personalised, job-specific cover letter"]].map(([k,ic,l,d]) => (
            <div key={k} onClick={() => setOpts(o=>({...o,[k]:!o[k]}))} style={{border:`2px solid ${opts[k]?C.accent:C.border}`,background:opts[k]?`${C.accent}08`:C.card2,borderRadius:12,padding:14,cursor:"pointer",marginBottom:10,display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:20}}>{ic}</span>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{l}</div><div style={{color:C.muted,fontSize:12,marginTop:2}}>{d}</div></div>
              <div style={{width:20,height:20,borderRadius:4,border:`2px solid ${opts[k]?C.accent:C.muted}`,background:opts[k]?C.accent:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {opts[k]&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
              </div>
            </div>
          ))}
          <button style={{...S.btn,width:"100%",padding:14,opacity:(opts.resume||opts.cover)?1:.4}} disabled={!opts.resume&&!opts.cover} onClick={tailor}>✨ Generate with AI →</button>
        </div>
      </div>
    );
  }

  if (phase==="applied") return (
    <div style={{maxWidth:560,margin:"0 auto"}}>
      <div style={{...S.card,textAlign:"center",padding:"40px 24px"}}>
        <div style={{fontSize:60,marginBottom:14}}>🎉</div>
        <div style={{fontSize:24,fontWeight:900,color:C.green,marginBottom:8}}>Application Submitted!</div>
        <p style={{color:C.muted,fontSize:14,lineHeight:1.7,marginBottom:20}}>Your tailored application for <strong style={{color:C.text}}>{job.title}</strong> at <strong style={{color:C.text}}>{job.company}</strong> has been sent.</p>
        <div style={{background:`${C.green}07`,border:`1px solid ${C.green}20`,borderRadius:12,padding:18,marginBottom:20,textAlign:"left"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.green,marginBottom:8}}>📋 What happens next</div>
          {["HR team receives your pre-screened profile","AI analysis is run on your candidacy","If shortlisted, you'll get interview questions below","Typical response time: 3–5 business days"].map((s,i) => (
            <div key={i} style={{fontSize:12,color:"#bbc8e0",padding:"5px 0",borderTop:i>0?`1px solid ${C.border}`:"none",display:"flex",gap:10}}>
              <span style={{color:C.green,fontWeight:700,flexShrink:0}}>{i+1}.</span>{s}
            </div>
          ))}
        </div>
        {/* Interview Prep */}
        <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}25`,borderRadius:12,padding:18,marginBottom:20,textAlign:"left"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.accentL,marginBottom:8}}>🧠 Prepare for your interview</div>
          {prepLoading ? <Spinner text="Generating questions"/> : interviewPrep ? (
            <div>
              {interviewPrep.questions.map((q,i) => (
                <div key={i} style={{background:C.card2,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
                  <div style={{display:"flex",gap:8,marginBottom:4}}>
                    <span style={{color:C.accent,fontWeight:800,fontSize:12,flexShrink:0}}>Q{i+1}</span>
                    <span style={{fontSize:13,fontWeight:600}}>{q.q}</span>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <span style={{background:`${C.purple}20`,color:C.purple,fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,flexShrink:0}}>{q.framework}</span>
                    <span style={{fontSize:11,color:C.muted}}>{q.hint}</span>
                  </div>
                </div>
              ))}
            </div>
          ) : <button style={{...S.btn,width:"100%"}} onClick={genPrep}>Generate Interview Questions →</button>}
        </div>
        <button style={{...S.btnO,width:"100%"}} onClick={onBack}>← Back to Dashboard</button>
      </div>
    </div>
  );

  // result phase
  return (
    <div style={{maxWidth:700,margin:"0 auto"}}>
      <button style={{...S.btnO,marginBottom:18,padding:"7px 14px",fontSize:12}} onClick={() => setPhase("tailor")}>← Back</button>
      {loading ? <div style={S.card}><Spinner text="AI tailoring your application"/></div> : result && (
        <div style={S.card}>
          <Tag c="green" ch="Application Ready"/>
          <h2 style={{fontSize:20,fontWeight:900,margin:"10px 0 6px"}}>Your Application is Ready</h2>
          <p style={{color:C.muted,fontSize:13,marginBottom:18}}>{result.summary}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            {[["🤖 ATS Score",result.atsScore,result.atsNotes,C.accent],["👔 Hiring Manager",result.hmScore,result.hmNotes,C.green]].map(([l,sc,notes,c]) => (
              <div key={l} style={{background:C.card2,borderRadius:12,padding:14,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:4}}>{l}</div>
                <div style={{fontSize:30,fontWeight:900,color:c}}>{sc}<span style={{fontSize:12,fontWeight:400}}>/100</span></div>
                {notes?.map((n,i) => <div key={i} style={{fontSize:11,color:"#bbc8e0",padding:"3px 0",borderTop:i>0?`1px solid ${C.border}`:"none"}}>✓ {n}</div>)}
              </div>
            ))}
          </div>
          {result.improvements && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {result.improvements.map((imp,i) => <div key={i} style={{background:C.card2,borderRadius:8,padding:"8px 12px",fontSize:12,color:"#bbc8e0",display:"flex",gap:6}}><span style={{color:C.green}}>✦</span>{imp}</div>)}
            </div>
          )}
          {opts.resume && result.tailoredResume && (
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:13}}>📄 Tailored Resume</div>
                <button style={{...S.btnG,padding:"6px 14px",fontSize:12}} onClick={() => { const a=document.createElement("a"); a.href="data:text/plain;charset=utf-8,"+encodeURIComponent(result.tailoredResume); a.download=`Resume_${job.title.replace(/ /g,"_")}.txt`; a.click(); }}>⬇ Download</button>
              </div>
              <pre style={{...S.ta,whiteSpace:"pre-wrap",fontSize:12,lineHeight:1.6,maxHeight:180,overflowY:"auto",display:"block",padding:12}}>{result.tailoredResume}</pre>
            </div>
          )}
          {opts.cover && result.coverLetter && (
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:13}}>✉️ Cover Letter</div>
                <button style={{...S.btnG,padding:"6px 14px",fontSize:12}} onClick={() => { const a=document.createElement("a"); a.href="data:text/plain;charset=utf-8,"+encodeURIComponent(result.coverLetter); a.download="CoverLetter.txt"; a.click(); }}>⬇ Download</button>
              </div>
              <pre style={{...S.ta,whiteSpace:"pre-wrap",fontSize:12,lineHeight:1.6,maxHeight:140,overflowY:"auto",display:"block",padding:12}}>{result.coverLetter}</pre>
            </div>
          )}
          <button style={{...S.btn,width:"100%"}} onClick={() => { onApply(job,score,result,skills); setPhase("applied"); toast("Application sent! 🎉","HR team notified","success","🚀"); }}>✅ Submit Application</button>
        </div>
      )}
    </div>
  );
}

/* ─── MARKET INSIGHTS ───────────────────────────────────────────── */
function MarketInsights({ profile }) {
  const jobs = JOBS.filter(j => profile.buckets.includes(j.bucket)||profile.buckets.includes("Mixed"));
  const sf = {};
  jobs.forEach(j => j.skills.forEach(s => { sf[s.name]=(sf[s.name]||0)+(s.major?2:1); }));
  const top = Object.entries(sf).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const mx = top[0]?.[1]||1;
  return (
    <div>
      <Tag c="gold" ch="Market Intelligence"/>
      <h2 style={{fontSize:24,fontWeight:900,margin:"10px 0 4px"}}>Market Insights</h2>
      <p style={{color:C.muted,fontSize:14,marginBottom:24}}>Based on {jobs.length} live roles in your interest areas</p>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.gold,marginBottom:14}}>📊 Top In-Demand Skills</div>
        {top.map(([skill,freq]) => (
          <div key={skill} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
              <span style={{color:C.text}}>{skill}</span>
              <span style={{color:C.gold,fontWeight:700}}>{freq} roles</span>
            </div>
            <div style={{background:C.card2,borderRadius:3,height:6,overflow:"hidden"}}>
              <div style={{background:C.gold,width:`${(freq/mx)*100}%`,height:"100%",borderRadius:3}}/>
            </div>
          </div>
        ))}
      </div>
      <div style={{...S.card,marginTop:16,background:`${C.purple}08`,border:`1px solid ${C.purple}25`}}>
        <div style={{fontSize:13,fontWeight:700,color:C.purple,marginBottom:10}}>💡 EasyJob Intelligence</div>
        {["Candidates scoring 80%+ convert to interviews at 6.5x the rate of those below 40%.","Completing the full skill assessment improves AI tailoring accuracy by 34%.","Applications in the first 72 hours have 2.8x higher response rates.","Self-rated SQL 4/5 candidates pass technical rounds 72% of the time."].map((txt,i) => (
          <div key={i} style={{fontSize:12,color:"#bbc8e0",padding:"8px 0",borderTop:i>0?`1px solid ${C.border}`:"none",lineHeight:1.6}}>
            <span style={{color:C.purple,fontWeight:700}}>→ </span>{txt}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── SEEKER FEEDBACK MODAL (V2 4-step flow) ─────────────────────── */
function SeekerFeedbackModal({ app, onSubmit, onDismiss }) {
  const [step, setStep] = useState(0);
  const [o, setO] = useState({ type:null, roundsReached:[], finalOutcome:null, salaryOffered:"", salaryExpected:"", rejectedAt:null, reason:null, notes:"" });
  const upd = (k,v) => setO(x=>({...x,[k]:v}));
  const toggleRound = r => upd("roundsReached", o.roundsReached.includes(r)?o.roundsReached.filter(x=>x!==r):[...o.roundsReached,r]);
  const steps = ["Response","Rounds","Outcome","Notes"];
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20,overflowY:"auto"}}>
      <div style={{...S.card,width:"100%",maxWidth:480,animation:"fadeUp .3s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <h3 style={{fontSize:16,fontWeight:800,marginBottom:3}}>{app.job.title} at {app.job.company}</h3>
            <p style={{color:C.muted,fontSize:12}}>Applied {app.daysAgo}d ago · EasyJob score: <span style={{color:C.accentL,fontWeight:700}}>{app.score}%</span></p>
          </div>
          <button onClick={onDismiss} style={{...S.btnO,padding:"5px 10px",fontSize:12}}>✕</button>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:20}}>
          {steps.map((l,i) => <div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?C.accent:C.border,transition:".3s"}}/>)}
        </div>
        {step===0 && (
          <div>
            <p style={{fontWeight:700,fontSize:14,marginBottom:14}}>Did you hear back from {app.job.company}?</p>
            <div style={{display:"grid",gap:8}}>
              {RESPONSE_TYPES.map(rt => (
                <button key={rt.id} onClick={() => { upd("type",rt.id); setStep(rt.id==="interview"?1:rt.id==="rejected"?1:2); }} style={btnT(o.type===rt.id, rt.color)}>
                  <div style={{fontWeight:700,fontSize:13}}>{rt.label}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{rt.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}
        {step===1 && (
          <div>
            <p style={{fontWeight:700,fontSize:14,marginBottom:6}}>{o.type==="interview"?"Which rounds did you reach?":"Which round were you rejected at?"}</p>
            <p style={{color:C.muted,fontSize:12,marginBottom:14}}>This is the most valuable data point — be precise.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {INTERVIEW_ROUNDS.map(r => {
                const sel = o.type==="interview"?o.roundsReached.includes(r.id):o.rejectedAt===r.id;
                return (
                  <button key={r.id} onClick={() => o.type==="interview"?toggleRound(r.id):upd("rejectedAt",r.id)} style={btnT(sel, o.type==="interview"?C.green:C.danger)}>
                    <span style={{fontSize:18,display:"block",marginBottom:3}}>{r.icon}</span>
                    <span style={{fontSize:12,fontWeight:700}}>{r.label}</span>
                  </button>
                );
              })}
            </div>
            {o.type==="rejected" && (
              <div style={{marginBottom:14}}>
                <label style={S.lbl}>Reason given (if any)</label>
                <div style={{display:"grid",gap:5}}>
                  {REJECTION_REASONS.map(r => <button key={r} onClick={() => upd("reason",r)} style={btnT(o.reason===r, C.warn)}><span style={{fontSize:12}}>{r}</span></button>)}
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button style={S.btnO} onClick={() => setStep(0)}>← Back</button>
              <button style={{...S.btn,flex:1}} disabled={o.type==="interview"?!o.roundsReached.length:!o.rejectedAt} onClick={() => setStep(2)}>Next →</button>
            </div>
          </div>
        )}
        {step===2 && (
          <div>
            <p style={{fontWeight:700,fontSize:14,marginBottom:14}}>Final outcome?</p>
            {o.type==="interview" && (
              <div style={{display:"grid",gap:8,marginBottom:14}}>
                {[["offer","🎉 Received an Offer",C.green],["rejected","❌ Was Rejected",C.danger],["pending","⏳ Still in Process",C.warn]].map(([id,l,c]) => (
                  <button key={id} onClick={() => upd("finalOutcome",id)} style={btnT(o.finalOutcome===id, c)}><span style={{fontWeight:700,fontSize:13}}>{l}</span></button>
                ))}
              </div>
            )}
            {o.finalOutcome==="offer" && (
              <div style={{display:"grid",gap:12,marginBottom:16}}>
                <div><label style={S.lbl}>Salary Offered</label><input style={S.inp} placeholder="e.g. ₹24 LPA" value={o.salaryOffered} onChange={e=>upd("salaryOffered",e.target.value)}/></div>
                <div><label style={S.lbl}>Your Expected Salary</label><input style={S.inp} placeholder="e.g. ₹22 LPA" value={o.salaryExpected} onChange={e=>upd("salaryExpected",e.target.value)}/></div>
              </div>
            )}
            {(o.type==="ghosted"||o.type==="waiting") && (
              <div style={{background:`${C.muted}10`,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:14}}>
                <p style={{fontSize:13,color:C.muted}}>Your data point still helps us understand response rates by company and role.</p>
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button style={S.btnO} onClick={() => setStep(o.type==="interview"||o.type==="rejected"?1:0)}>← Back</button>
              <button style={{...S.btn,flex:1}} onClick={() => setStep(3)}>Next →</button>
            </div>
          </div>
        )}
        {step===3 && (
          <div>
            <p style={{fontWeight:700,fontSize:14,marginBottom:6}}>Anything else to note?</p>
            <p style={{color:C.muted,fontSize:12,marginBottom:14}}>Optional — more context improves predictions for future candidates.</p>
            <textarea style={{...S.ta,minHeight:90,marginBottom:14}} placeholder="e.g. Case study was harder than expected. They tested quant skills deeply…" value={o.notes} onChange={e=>upd("notes",e.target.value)}/>
            <div style={{background:`${C.green}08`,border:`1px solid ${C.green}20`,borderRadius:10,padding:12,marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:C.green,marginBottom:6}}>🔒 How your data is used</div>
              {["Skill ratings cross-referenced with outcome to improve pass-rate predictions","Salary data anonymised for market benchmarking","You are never identified in aggregate metrics"].map((t,i) => (
                <div key={i} style={{fontSize:11,color:"#aabbd0",padding:"3px 0",borderTop:i>0?`1px solid ${C.border}`:"none",display:"flex",gap:8}}><span style={{color:C.green}}>✓</span>{t}</div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={S.btnO} onClick={() => setStep(2)}>← Back</button>
              <button style={{...S.btnG,flex:1}} onClick={() => onSubmit({...o,reportedAt:new Date().toISOString()})}>✅ Submit Outcome</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── SEEKER TRACKER ────────────────────────────────────────────── */
function SeekerTracker({ applications, onFeedback, toast }) {
  const [activeFeedback, setActiveFeedback] = useState(null);
  const nudge = app => {
    if (app.seekerOutcome) return null;
    const d = app.daysAgo||7;
    if (d>=45) return {label:"45-day final nudge",color:C.danger,urgent:true};
    if (d>=21) return {label:"21-day follow-up due",color:C.warn,urgent:true};
    if (d>=7)  return {label:"7-day check-in due",color:C.warn,urgent:false};
    return null;
  };
  const pending = applications.filter(a=>!a.seekerOutcome);
  const done    = applications.filter(a=> a.seekerOutcome);
  return (
    <div>
      {activeFeedback && (
        <SeekerFeedbackModal app={activeFeedback}
          onSubmit={o => { onFeedback(activeFeedback.id, o); setActiveFeedback(null); toast("Outcome reported! 🙏","Your data makes EasyJob smarter","success","📊"); }}
          onDismiss={() => setActiveFeedback(null)}/>
      )}
      <div style={{marginBottom:20}}>
        <Tag c="default" ch="My Applications"/>
        <h2 style={{fontSize:24,fontWeight:900,margin:"10px 0 4px"}}>Application Tracker</h2>
        <p style={{color:C.muted,fontSize:14}}>{pending.length} awaiting feedback · {done.length} reported</p>
      </div>
      {!applications.length && (
        <div style={{...S.card,textAlign:"center",padding:40}}>
          <div style={{fontSize:44,marginBottom:12}}>📭</div>
          <div style={{fontWeight:700,marginBottom:6}}>No applications yet</div>
          <div style={{color:C.muted,fontSize:13}}>Apply to jobs from the Dashboard and track them here.</div>
        </div>
      )}
      {pending.length>0 && (
        <div style={{marginBottom:24}}>
          <div style={{fontSize:11,fontWeight:700,color:C.warn,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>⏳ Awaiting Your Report</div>
          <div style={{display:"grid",gap:10}}>
            {pending.map(app => {
              const n = nudge(app), sc = STAGE_COLORS[app.stage||"Applied"]||C.muted;
              return (
                <div key={app.id} style={{...S.card,border:`1px solid ${n?.urgent?C.warn:C.border}`}}>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    <PctRing pct={app.score} size={48}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14}}>{app.job.title}</div>
                      <div style={{color:C.muted,fontSize:12,marginTop:2}}>{app.job.company} · {app.job.salary}</div>
                      <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}>
                        <span style={{background:`${sc}18`,color:sc,border:`1px solid ${sc}40`,borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700}}>{app.stage||"Applied"}</span>
                        {n&&<span style={{background:`${n.color}18`,color:n.color,border:`1px solid ${n.color}40`,borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700}}>{n.urgent?"🔴":"🟡"} {n.label}</span>}
                        <span style={{background:C.card2,color:C.muted,borderRadius:20,padding:"2px 10px",fontSize:10}}>Applied {app.daysAgo}d ago</span>
                      </div>
                    </div>
                    <button style={{...S.btn,padding:"8px 14px",fontSize:12,flexShrink:0}} onClick={() => setActiveFeedback(app)}>Report →</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {done.length>0 && (
        <div>
          <div style={{fontSize:11,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>✓ Outcomes Reported</div>
          <div style={{display:"grid",gap:10}}>
            {done.map(app => {
              const oc = app.seekerOutcome, td = RESPONSE_TYPES.find(r=>r.id===oc.type);
              return (
                <div key={app.id} style={{...S.card,opacity:.85}}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <PctRing pct={app.score} size={44}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14}}>{app.job.title} at {app.job.company}</div>
                      <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
                        <span style={{background:`${td?.color}18`,color:td?.color,border:`1px solid ${td?.color}40`,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700}}>{td?.label}</span>
                        {oc.roundsReached?.map(r=><span key={r} style={{background:`${C.accent}15`,color:C.accentL,borderRadius:20,padding:"3px 10px",fontSize:10}}>{INTERVIEW_ROUNDS.find(x=>x.id===r)?.label}</span>)}
                        {oc.finalOutcome==="offer"&&<span style={{background:`${C.green}15`,color:C.green,borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:700}}>🎉 {oc.salaryOffered}</span>}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── HR FEEDBACK MODAL (V2 calibration flow) ────────────────────── */
function HRFeedbackModal({ app, onSubmit, onDismiss }) {
  const [rounds, setRounds] = useState(app.hrOutcome?.rounds||[{round:"hr_screen",passed:null,notes:""}]);
  const [finalDecision, setFinalDecision] = useState(app.hrOutcome?.finalDecision||null);
  const [calibration, setCalibration] = useState(app.hrOutcome?.skillCalibration||{});
  const [accuracy, setAccuracy] = useState(app.hrOutcome?.accuracyNotes||"");
  const addRound = () => setRounds(r=>[...r,{round:"",passed:null,notes:""}]);
  const updRound = (i,k,v) => setRounds(r=>r.map((x,idx)=>idx===i?{...x,[k]:v}:x));
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20,overflowY:"auto"}}>
      <div style={{...S.card,width:"100%",maxWidth:560,animation:"fadeUp .3s ease",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div><Tag c="green" ch="HR Outcome Report"/><h3 style={{fontSize:16,fontWeight:800,margin:"8px 0 3px"}}>{app.candidateName}</h3><p style={{color:C.muted,fontSize:12}}>{app.job.title} · EasyJob: <span style={{color:C.accentL,fontWeight:700}}>{app.score}%</span></p></div>
          <button onClick={onDismiss} style={{...S.btnO,padding:"5px 10px",fontSize:12}}>✕</button>
        </div>
        {/* Self-assessment shown to HR */}
        <div style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Candidate Self-Assessment</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {Object.entries(app.skillRatings||{}).map(([sk,r]) => (
              <div key={sk} style={{display:"flex",justifyContent:"space-between",background:C.card,borderRadius:8,padding:"6px 10px"}}>
                <span style={{fontSize:11}}>{sk}</span>
                <span style={{fontSize:11,fontWeight:700,color:SKILL_COLORS[r]||C.muted}}>{r}/5 — {SKILL_LABELS[r]}</span>
              </div>
            ))}
          </div>
        </div>
        {/* Round outcomes */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Interview Round Outcomes</div>
          {rounds.map((r,i) => (
            <div key={i} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div><label style={S.lbl}>Round</label>
                  <select value={r.round} onChange={e=>updRound(i,"round",e.target.value)} style={{...S.inp,cursor:"pointer"}}>
                    <option value="">Select round</option>
                    {INTERVIEW_ROUNDS.map(ir=><option key={ir.id} value={ir.id}>{ir.label}</option>)}
                  </select>
                </div>
                <div><label style={S.lbl}>Result</label>
                  <div style={{display:"flex",gap:6,marginTop:2}}>
                    {[["passed","✓ Passed",C.green],["failed","✗ Failed",C.danger]].map(([val,lbl,c])=>(
                      <button key={val} onClick={()=>updRound(i,"passed",val==="passed")} style={{flex:1,padding:"8px 6px",borderRadius:8,border:`2px solid ${r.passed===(val==="passed")?c:C.border}`,background:r.passed===(val==="passed")?`${c}20`:"none",color:r.passed===(val==="passed")?c:C.muted,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:F}}>{lbl}</button>
                    ))}
                  </div>
                </div>
              </div>
              <label style={S.lbl}>Interviewer Notes</label>
              <textarea style={{...S.ta,minHeight:50}} placeholder="e.g. Strong SQL but struggled with system design…" value={r.notes} onChange={e=>updRound(i,"notes",e.target.value)}/>
            </div>
          ))}
          <button onClick={addRound} style={{...S.btnO,width:"100%",fontSize:12,padding:"8px"}}>+ Add Another Round</button>
        </div>
        {/* Skill calibration — THE KEY DATA MOAT INPUT */}
        <div style={{background:`${C.gold}08`,border:`1px solid ${C.gold}25`,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:C.gold,marginBottom:4}}>⭐ Skill Accuracy Calibration</div>
          <p style={{fontSize:11,color:C.muted,marginBottom:14,lineHeight:1.6}}>Did self-ratings match actual performance? This powers the prediction model — the most valuable input you can give.</p>
          {Object.entries(app.skillRatings||{}).filter(([,r])=>r>=3).slice(0,4).map(([skill,selfR]) => (
            <div key={skill} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
                <span style={{fontWeight:600}}>{skill}</span>
                <span style={{color:C.muted}}>Self-rated: <span style={{color:C.accentL,fontWeight:700}}>{selfR}/5</span></span>
              </div>
              <div style={{display:"flex",gap:6}}>
                {[["overrated","👆 Overrated",C.danger],["accurate","✓ Accurate",C.green],["underrated","👇 Underrated",C.purple]].map(([val,lbl,c])=>(
                  <button key={val} onClick={()=>setCalibration(s=>({...s,[skill]:val}))} style={{flex:1,padding:"7px 4px",borderRadius:8,border:`2px solid ${calibration[skill]===val?c:C.border}`,background:calibration[skill]===val?`${c}20`:"none",color:calibration[skill]===val?c:C.muted,fontWeight:700,fontSize:10,cursor:"pointer",fontFamily:F}}>{lbl}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:16}}>
          <label style={S.lbl}>Final Decision</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[["offer_extended","🎉 Offer Extended",C.green],["rejected","❌ Rejected",C.danger],["on_hold","⏸️ On Hold",C.warn],["hired","✅ Hired & Joined",C.teal]].map(([val,lbl,c])=>(
              <button key={val} onClick={()=>setFinalDecision(val)} style={btnT(finalDecision===val,c)}><span style={{fontSize:12,fontWeight:700}}>{lbl}</span></button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <label style={S.lbl}>EasyJob Score Accuracy</label>
          <div style={{display:"flex",gap:8}}>
            {[["very_accurate","Very Accurate"],["somewhat","Somewhat"],["inaccurate","Inaccurate"]].map(([val,lbl])=>(
              <button key={val} onClick={()=>setAccuracy(val)} style={{flex:1,...btnT(accuracy===val,C.accent),textAlign:"center"}}><span style={{fontSize:12}}>{lbl}</span></button>
            ))}
          </div>
        </div>
        <button style={{...S.btnG,width:"100%",padding:14}} onClick={() => onSubmit({rounds,finalDecision,skillCalibration:calibration,accuracyNotes:accuracy,reportedAt:new Date().toISOString()})}>✅ Submit Outcome Report</button>
      </div>
    </div>
  );
}

/* ─── HR PIPELINE ────────────────────────────────────────────────── */
function HRPipeline({ applications, onStageChange, onHROutcome, toast }) {
  const [selected, setSelected] = useState(null);
  const [hrFeedbackFor, setHrFeedbackFor] = useState(null);
  const [analysis, setAnalysis] = useState({});
  const [aiLoading, setAiLoading] = useState({});
  const [filter, setFilter] = useState("All");

  const analyze = async app => {
    if (analysis[app.id]) return;
    setAiLoading(l=>({...l,[app.id]:true}));
    const sys = "You are an expert HR analyst. Return ONLY valid JSON with keys: recommendation(string: Strongly Recommend|Recommend|Consider|Pass), interviewQuestions(array of 3 strings), redFlags(array of 2 strings), strengths(array of 3 strings), hiringRisk(string: Low|Medium|High)";
    const prompt = `Candidate: ${app.candidateName}. Applied: ${app.job.title} at ${app.job.company}. Score: ${app.score}%. Skills: ${Object.entries(app.skillRatings||{}).map(([s,r])=>`${s}:${r}/5`).join(", ")}.`;
    try {
      const raw = await callClaude([{role:"user",content:prompt}], sys);
      setAnalysis(a=>({...a,[app.id]:JSON.parse(raw.replace(/```json|```/g,"").trim())}));
    } catch(e) {
      setAnalysis(a=>({...a,[app.id]:{recommendation:"Recommend",interviewQuestions:["Walk me through your core skills for this role","Describe your biggest impact in a similar role","Where is your growth area for this position?"],redFlags:["Self-assessment calibration not yet verified","Limited outcome data for this candidate"],strengths:["Completed full AI assessment","Submitted tailored application","Strong fit score"],hiringRisk:"Medium"}}));
    }
    setAiLoading(l=>({...l,[app.id]:false}));
  };

  const filtered = filter==="All"?applications:applications.filter(a=>a.job.bucket===filter);

  if (!applications.length) return (
    <div style={{maxWidth:520,margin:"0 auto"}}>
      <Tag c="green" ch="HR Dashboard"/>
      <h2 style={{fontSize:24,fontWeight:900,margin:"10px 0 20px"}}>Candidate Pipeline</h2>
      <div style={{...S.card,textAlign:"center",padding:"40px 24px",marginBottom:16}}>
        <div style={{fontSize:52,marginBottom:14}}>📭</div>
        <h3 style={{fontSize:18,fontWeight:800,marginBottom:8}}>Pipeline is Empty</h3>
        <p style={{color:C.muted,fontSize:13,lineHeight:1.7,marginBottom:20}}>Candidates who apply through EasyJob appear here — pre-scored, skill-assessed, ready for review.</p>
        <div style={{display:"grid",gap:10,textAlign:"left"}}>
          {[["1","Share the seeker link","Send seekers to the Job Seeker side"],["2","They self-assess skills","Candidates rate proficiency on each role"],["3","AI tailors their application","Every application scored + ATS-optimised"],["4","You review here","Structured profiles, AI analysis, interview questions"]].map(([n,t,d])=>(
            <div key={n} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",display:"flex",gap:14,alignItems:"flex-start"}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:`${C.accent}20`,color:C.accent,fontWeight:800,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div>
              <div><div style={{fontWeight:700,fontSize:13,marginBottom:3}}>{t}</div><div style={{fontSize:12,color:C.muted}}>{d}</div></div>
            </div>
          ))}
        </div>
      </div>
      <div style={{...S.card,padding:"14px 18px",background:`${C.accent}05`,border:`1px solid ${C.accent}20`,display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:20}}>💡</span>
        <p style={{fontSize:13,color:"#bbc8e0",margin:0}}>To test: switch to <strong style={{color:C.accent}}>👤 Seeker</strong> mode, create a profile, apply to a role, then return here.</p>
      </div>
    </div>
  );

  if (selected) {
    const app = selected, ai = analysis[app.id], stage = app.stage||"Applied", sc = STAGE_COLORS[stage]||C.muted;
    return (
      <div style={{maxWidth:700,margin:"0 auto"}}>
        {hrFeedbackFor && (
          <HRFeedbackModal app={hrFeedbackFor}
            onSubmit={o => { onHROutcome(hrFeedbackFor.id, o); setHrFeedbackFor(null); setSelected(prev=>({...prev,hrOutcome:o})); toast("Outcome logged","Calibration updated","success","📊"); }}
            onDismiss={() => setHrFeedbackFor(null)}/>
        )}
        <button style={{...S.btnO,marginBottom:16,padding:"7px 14px",fontSize:12}} onClick={() => setSelected(null)}>← Pipeline</button>
        <div style={S.card}>
          <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:20}}>
            <div style={{width:50,height:50,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.green})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,flexShrink:0,color:"#fff"}}>{app.candidateName[0]}</div>
            <div style={{flex:1}}>
              <h2 style={{fontSize:19,fontWeight:900,marginBottom:3}}>{app.candidateName}</h2>
              <p style={{color:C.muted,fontSize:13}}>Applied for <strong style={{color:C.text}}>{app.job.title}</strong> at {app.job.company}</p>
            </div>
            <PctRing pct={app.score} size={56}/>
          </div>
          {/* Pipeline stage selector */}
          <div style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Pipeline Stage</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {PIPELINE_STAGES.map(s => {
                const c = STAGE_COLORS[s]||C.muted;
                return <button key={s} onClick={() => { onStageChange(app.id,s); setSelected(prev=>({...prev,stage:s})); toast("Stage updated",`${app.candidateName} → ${s}`,s==="Rejected"?"warn":"success","✅"); }} style={{background:stage===s?`${c}25`:"none",color:stage===s?c:C.muted,border:`1px solid ${stage===s?c:C.border}`,borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:F,transition:".2s"}}>{s}</button>;
              })}
            </div>
          </div>
          {/* Skill grid */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Self-Assessed Skills</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {Object.entries(app.skillRatings||{}).map(([sk,r]) => (
                <div key={sk} style={{background:C.card2,borderRadius:8,padding:"7px 12px",display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:11}}>{sk}</span>
                  <span style={{fontSize:11,color:SKILL_COLORS[r]||C.muted,fontWeight:700}}>{SKILL_LABELS[r]||r}</span>
                </div>
              ))}
            </div>
          </div>
          {/* HR outcome preview */}
          {app.hrOutcome?.rounds?.length>0 && (
            <div style={{background:`${C.green}08`,border:`1px solid ${C.green}20`,borderRadius:12,padding:14,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:C.green,marginBottom:8}}>✓ Outcome Logged</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {app.hrOutcome.rounds.map((r,i)=><span key={i} style={{background:r.passed?`${C.green}15`:`${C.danger}15`,color:r.passed?C.green:C.danger,border:`1px solid ${r.passed?`${C.green}30`:`${C.danger}30`}`,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600}}>{INTERVIEW_ROUNDS.find(x=>x.id===r.round)?.label} {r.passed?"✓":"✗"}</span>)}
                {app.hrOutcome.finalDecision&&<span style={{background:`${C.gold}15`,color:C.gold,border:`1px solid ${C.gold}30`,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700}}>{app.hrOutcome.finalDecision.replace("_"," ")}</span>}
              </div>
            </div>
          )}
          <button onClick={() => setHrFeedbackFor(app)} style={{...(app.hrOutcome?S.btnO:S.btn),width:"100%",marginBottom:14}}>
            {app.hrOutcome?"✏️ Edit Outcome Log":"⭐ Log Interview Outcome"}
          </button>
          {/* AI Analysis */}
          {!ai ? (
            aiLoading[app.id] ? <Spinner text="AI analysing candidate"/> :
            <button style={{...S.btn,width:"100%",background:C.purple}} onClick={() => analyze(app)}>🤖 Run AI Analysis</button>
          ) : (
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                {[["Recommendation",ai.recommendation,ai.recommendation==="Strongly Recommend"?C.green:ai.recommendation==="Recommend"?C.accentL:ai.recommendation==="Consider"?C.warn:C.danger],["Hiring Risk",ai.hiringRisk,ai.hiringRisk==="Low"?C.green:ai.hiringRisk==="Medium"?C.warn:C.danger]].map(([l,val,c])=>(
                  <div key={l} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,padding:14,textAlign:"center"}}>
                    <div style={{fontSize:11,color:C.muted,marginBottom:4,textTransform:"uppercase"}}>{l}</div>
                    <div style={{fontSize:16,fontWeight:800,color:c}}>{val}</div>
                  </div>
                ))}
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:C.green,marginBottom:8}}>✦ Strengths</div>
                {ai.strengths?.map((s,i)=><div key={i} style={{fontSize:12,color:"#bbc8e0",padding:"4px 0",borderBottom:`1px solid ${C.border}`,display:"flex",gap:8}}><span style={{color:C.green}}>→</span>{s}</div>)}
              </div>
              {ai.redFlags?.length>0 && (
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.warn,marginBottom:8}}>⚠ Points to Probe</div>
                  {ai.redFlags.map((f,i)=><div key={i} style={{fontSize:12,color:"#bbc8e0",padding:"4px 0",borderBottom:`1px solid ${C.border}`,display:"flex",gap:8}}><span style={{color:C.warn}}>→</span>{f}</div>)}
                </div>
              )}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:C.accentL,marginBottom:8}}>💬 Interview Questions</div>
                {ai.interviewQuestions?.map((q,i)=>(
                  <div key={i} style={{background:C.card2,borderRadius:8,padding:"10px 12px",marginBottom:8,fontSize:12,color:"#bbc8e0",display:"flex",gap:8}}>
                    <span style={{color:C.accent,fontWeight:700,flexShrink:0}}>Q{i+1}</span>{q}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{marginBottom:20}}>
        <Tag c="green" ch="HR Dashboard"/>
        <h2 style={{fontSize:24,fontWeight:900,margin:"10px 0 4px"}}>Candidate Pipeline</h2>
        <p style={{color:C.muted,fontSize:14}}>{applications.length} candidates · Log outcomes to build prediction accuracy</p>
      </div>
      <div style={{background:`${C.gold}08`,border:`1px solid ${C.gold}25`,borderRadius:12,padding:14,marginBottom:16,display:"flex",gap:12,alignItems:"center"}}>
        <span style={{fontSize:22,flexShrink:0}}>⭐</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13,color:C.gold,marginBottom:2}}>Log outcomes → build the data moat</div>
          <div style={{fontSize:11,color:C.muted}}>Every interview result logged improves EasyJob's skill pass-rate predictions for future candidates.</div>
        </div>
        <div style={{fontSize:13,fontWeight:800,color:C.gold,flexShrink:0,textAlign:"center"}}>
          {applications.filter(a=>a.hrOutcome).length}/{applications.length}
          <div style={{fontSize:10,fontWeight:400,color:C.muted}}>logged</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {["All",...BUCKETS.filter(b=>b!=="Mixed")].map(b=>(
          <button key={b} onClick={()=>setFilter(b)} style={{background:filter===b?C.accent:"none",color:filter===b?"#fff":C.muted,border:`1px solid ${filter===b?C.accent:C.border}`,borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:F,transition:".2s"}}>{b}</button>
        ))}
      </div>
      <div style={{display:"grid",gap:10}}>
        {filtered.map(app => {
          const stage = app.stage||"Applied", sc = STAGE_COLORS[stage]||C.muted, hasO = !!app.hrOutcome;
          return (

}

function App() {

  const [seekerView, setSeekerView] = useState("onboard");
  const [hrView, setHrView]       = useState("pipeline");
  const [profile, setProfile]     = useState(null);
  const [selectedJob, setSelectedJob]   = useState(null);
  const [selectedScore, setSelectedScore] = useState(null);
  // Pre-seed HR pipeline with MOCK_APPS (from V2)
  const [applications, setApplications] = useState(MOCK_APPS);
  const [appliedJobIds, setAppliedJobIds]     = useState(new Set());
  const [bookmarkedJobIds, setBookmarkedJobIds] = useState(new Set());
  const [savedSkillsByJob, setSavedSkillsByJob] = useState({});
  const [outcomes, setOutcomes]   = useState([...SEED_OUTCOMES]);
  const { toasts, toast, dismiss } = useToasts();

  const handleApply = (job, score, result, skills) => {
    const app = { id:Date.now(), candidateName:profile.name, profile, job, score, result, skillRatings:skills||savedSkillsByJob[job.id]||{}, appliedAt:new Date().toLocaleDateString(), daysAgo:0, stage:"Applied", seekerOutcome:null, hrOutcome:null };
    setApplications(a => [...a, app]);
    setAppliedJobIds(s => new Set([...s, job.id]));
  };
  const handleStageChange = (appId, stage) => setApplications(a => a.map(app => app.id===appId?{...app,stage}:app));
  const handleToggleBookmark = jobId => setBookmarkedJobIds(prev => { const next=new Set(prev); next.has(jobId)?next.delete(jobId):next.add(jobId); return next; });
  const handleSaveSkills = (jobId, skills) => setSavedSkillsByJob(prev => ({...prev,[jobId]:skills}));
  const handleSeekerFeedback = (appId, outcome) => {
    const app = applications.find(a=>a.id===appId);
    setApplications(a => a.map(x => x.id===appId?{...x,seekerOutcome:outcome}:x));
    if (app&&outcome.roundsReached?.length>0) {
      const pts = Object.entries(app.skillRatings||{}).map(([skill,rating])=>({skill,rating,round:outcome.roundsReached[0],passed:outcome.type==="interview"}));
      setOutcomes(o=>[...o,...pts]);
    }
  };
  const handleHROutcome = (appId, outcome) => {
    const app = applications.find(a=>a.id===appId);
    setApplications(a => a.map(x => x.id===appId?{...x,hrOutcome:outcome,stage:outcome.finalDecision==="offer_extended"||outcome.finalDecision==="hired"?"Offer Extended":outcome.finalDecision==="rejected"?"Rejected":x.stage}:x));
    if (app&&outcome.rounds?.length>0) {
      const pts = outcome.rounds.flatMap(r=>Object.entries(app.skillRatings||{}).map(([skill,rating])=>({skill,rating,round:r.round,passed:!!r.passed})));
      setOutcomes(o=>[...o,...pts]);
    }
  };
  const handleUpdateProfile = p => { setProfile(p); toast("Profile updated ✅","Match scores refreshed","success","👤"); };

  const seekerNavItems = [
    {id:"jobs",    label:"💼 Jobs"},
    {id:"tracker", label:"📋 My Applications", badge:appliedJobIds.size||null},
    {id:"insights",label:"📊 Insights"},
  ];
  const hrNavItems = [
    {id:"pipeline", label:"🏢 Pipeline", badge:applications.length||null},
    {id:"datamoat", label:"⭐ Data Moat"},
  ];

  if (mode==="landing") return (
    <>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}`}</style>
      <Landing onSeeker={()=>{setMode("seeker");setSeekerView("onboard");}} onHR={()=>setMode("hr")}/>
    </>
  );

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:F,display:"flex",flexDirection:"column"}}>
      {/* NAV */}
      <nav style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 20px",display:"flex",alignItems:"center",flexShrink:0,height:52,gap:4}}>
        <button onClick={()=>setMode("landing")} style={{fontSize:18,fontWeight:900,background:`linear-gradient(135deg,${C.accentL},${C.green})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",border:"none",cursor:"pointer",padding:0,fontFamily:F,marginRight:12}}>EasyJob</button>
        {/* Mode switcher */}
        {[["seeker","👤 Seeker",C.accent],["hr","🏢 HR",C.green]].map(([m,l,c])=>(
          <button key={m} onClick={()=>setMode(m)} style={{background:mode===m?`${c}20`:"none",color:mode===m?c:C.muted,border:`1px solid ${mode===m?c:C.border}`,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:F,transition:".2s"}}>{l}</button>
        ))}
        {/* Sub-nav */}
        <div style={{display:"flex",borderLeft:`1px solid ${C.border}`,paddingLeft:12,marginLeft:8,height:"100%",alignItems:"center"}}>
          {mode==="seeker"&&profile&&seekerNavItems.map(item=>(
            <button key={item.id} onClick={()=>setSeekerView(item.id)} style={{background:"none",border:"none",borderBottom:`2px solid ${seekerView===item.id&&seekerView!=="jobdetail"?C.accent:"transparent"}`,color:seekerView===item.id&&seekerView!=="jobdetail"?C.accent:C.muted,padding:"0 12px",height:"100%",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:F,display:"flex",alignItems:"center",gap:5,transition:".2s"}}>
              {item.label}{item.badge>0&&<span style={{background:C.accent,color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700}}>{item.badge}</span>}
            </button>

        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <span style={{background:`${C.gold}15`,color:C.gold,border:`1px solid ${C.gold}30`,borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:700}}>{outcomes.length} data pts</span>
          {profile&&mode==="seeker"&&<span style={{fontSize:12,color:C.muted,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profile.name}</span>}
          {mode==="hr"&&<Tag c="green" ch={`${applications.length} Candidates`}/>}
        </div>
      </nav>

      {/* CONTENT */}
      <div style={{flex:1,padding:"24px 20px 60px",overflowY:"auto"}}>
        <div style={{maxWidth:920,margin:"0 auto"}}>
          {mode==="seeker"&&(
            <>
              {seekerView==="onboard"&&<SeekerOnboarding onDone={p=>{setProfile(p);setSeekerView("jobs");}} toast={toast}/>}
              {seekerView==="jobs"&&profile&&<JobDashboard profile={profile} onUpdateProfile={handleUpdateProfile} onSelect={(job,score)=>{setSelectedJob(job);setSelectedScore(score);setSeekerView("jobdetail");}} appliedJobIds={appliedJobIds} bookmarkedJobIds={bookmarkedJobIds} onToggleBookmark={handleToggleBookmark} toast={toast}/>}
              {seekerView==="jobdetail"&&selectedJob&&profile&&<JobDetail job={selectedJob} initScore={selectedScore} profile={profile} onBack={()=>setSeekerView("jobs")} onApply={handleApply} savedSkills={savedSkillsByJob[selectedJob.id]||null} onSaveSkills={handleSaveSkills} toast={toast}/>}
              {seekerView==="tracker"&&profile&&<SeekerTracker applications={applications.filter(a=>a.candidateName===profile.name)} onFeedback={handleSeekerFeedback} toast={toast}/>}
              {seekerView==="insights"&&profile&&<MarketInsights profile={profile}/>}
            </>
          )}
          {mode==="hr"&&(
            <>
              {hrView==="pipeline"&&<HRPipeline applications={applications} onStageChange={handleStageChange} onHROutcome={handleHROutcome} toast={toast}/>}
              {hrView==="datamoat"&&<DataMoatDashboard outcomes={outcomes} applications={applications}/>}
            </>
          )}
        </div>
      </div>
      <ToastContainer toasts={toasts} dismiss={dismiss}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
